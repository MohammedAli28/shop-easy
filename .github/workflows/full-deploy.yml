name: 🚀 Full Deploy (Infra + Services)

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - destroy

env:
  AWS_REGION: us-east-1
  ECS_CLUSTER: shop-easy-cluster
  PROJECT: shop-easy

jobs:
  infrastructure:
    name: 🏗️ Provision Infrastructure
    runs-on: ubuntu-latest
    if: ${{ inputs.action == 'deploy' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Apply
        working-directory: terraform
        run: |
          # Override provider (no profile needed in CI, uses env credentials)
          cat > provider_override.tf << 'EOF'
          provider "aws" {
            region = "us-east-1"
          }
          EOF

          terraform init
          terraform apply -auto-approve \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="aws_profile="

          echo "### 🏗️ Infrastructure Output" >> $GITHUB_STEP_SUMMARY
          echo "ALB DNS: $(terraform output -raw alb_dns)" >> $GITHUB_STEP_SUMMARY

  deploy-services:
    name: 🐳 Build & Deploy Services
    runs-on: ubuntu-latest
    needs: infrastructure
    if: ${{ inputs.action == 'deploy' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push all images
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          services=("product-service" "cart-service" "order-service" "payment-service" "frontend")
          for svc in "${services[@]}"; do
            echo "🔨 Building $svc..."
            docker build --platform linux/amd64 --provenance=false \
              -t $REGISTRY/$PROJECT/$svc:latest \
              -t $REGISTRY/$PROJECT/$svc:${{ github.sha }} ./$svc
            echo "📤 Pushing $svc..."
            docker push $REGISTRY/$PROJECT/$svc --all-tags
          done

      - name: Deploy to ECS
        run: |
          for svc in product-service cart-service order-service payment-service frontend; do
            aws ecs update-service --cluster $ECS_CLUSTER --service $svc --force-new-deployment
          done

      - name: Wait for stable
        run: |
          echo "⏳ Waiting for services to stabilize (~3 min)..."
          aws ecs wait services-stable --cluster $ECS_CLUSTER \
            --services product-service cart-service order-service payment-service frontend

          ALB_DNS=$(aws elbv2 describe-load-balancers --names $PROJECT-alb \
            --query 'LoadBalancers[0].DNSName' --output text)

          echo "### 🚀 Deployment Complete!" >> $GITHUB_STEP_SUMMARY
          echo "App URL: http://$ALB_DNS" >> $GITHUB_STEP_SUMMARY

  destroy:
    name: 💣 Destroy Infrastructure
    runs-on: ubuntu-latest
    if: ${{ inputs.action == 'destroy' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Destroy
        working-directory: terraform
        run: |
          cat > provider_override.tf << 'EOF'
          provider "aws" {
            region = "us-east-1"
          }
          EOF

          terraform init
          terraform destroy -auto-approve \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="aws_profile="

          echo "### 💣 Infrastructure Destroyed" >> $GITHUB_STEP_SUMMARY
