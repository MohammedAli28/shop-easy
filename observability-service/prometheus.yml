global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'product-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['product-service:4001']
        labels:
          service: product-service

  - job_name: 'order-service'
    metrics_path: /metrics
    static_configs:
      - targets: ['order-service:4002']
        labels:
          service: order-service
